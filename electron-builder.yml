appId: fr.neuroboost
productName: NeuroBoost
directories:
  buildResources: resources
files:
  - '!src/*'
  - '!{.eslintignore,tsconfig*,electron.vite.config.*}'
win:
  executableName: NeuroBoost
  target: nsis
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  createDesktopShortcut: always
disableAsarIntegrity: true
